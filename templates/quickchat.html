<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashChat - Chronicle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #18181f;
            --surface3: #1e1e28;
            --border: #2a2a38;
            --border2: #333345;
            --text: #f0eeff;
            --text2: #8b8aa8;
            --text3: #55546a;
            --accent: #7c6bff;
            --accent2: #ff6b9d;
            --accent3: #00d4aa;
            --flash: #ffb800;
            --danger: #ff4444;
            --msg-out: #1e1b3a;
            --msg-in: #1a1a22;
        }
        
        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        /* Navigation - Compact */
        .navbar {
            height: 50px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            background: var(--surface);
            flex-shrink: 0;
        }
        
        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        
        .logo {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logo-icon { color: var(--accent); }
        
        .nav-links {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }
        
        .nav-links a {
            color: var(--text2);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }
        
        /* Main App - Full height without scroll */
        .chat-app {
            display: flex;
            height: calc(100vh - 50px);
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar-brand {
            font-size: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .search-bar {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .search-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text);
            outline: none;
            font-family: 'Outfit', sans-serif;
        }
        
        .search-input::placeholder { color: var(--text3); }
        .search-input:focus { border-color: var(--accent); }
        
        .section-label {
            padding: 10px 15px 5px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text3);
        }
        
        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }
        
        .contact-list::-webkit-scrollbar { width: 4px; }
        .contact-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
            margin-bottom: 4px;
        }
        
        .contact-item:hover { background: var(--surface2); }
        .contact-item.active { background: var(--surface3); }
        
        .c-avatar {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--surface3);
            position: relative;
            flex-shrink: 0;
        }
        
        .status-dot {
            position: absolute;
            bottom: -2px; right: -2px;
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid var(--surface);
        }
        .status-online { background: var(--accent3); }
        .status-offline { background: var(--border2); }
        
        .ftc-badge {
            position: absolute;
            top: -3px; right: -3px;
            width: 16px; height: 16px;
            background: var(--accent2);
            border-radius: 50%;
            border: 2px solid var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,107,157,0.5); }
            50% { box-shadow: 0 0 0 4px rgba(255,107,157,0); }
        }
        
        .c-info { flex: 1; min-width: 0; }
        
        .c-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .c-preview {
            font-size: 11px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }
        
        .c-actions {
            display: flex;
            gap: 6px;
        }
        
        .btn-mini {
            padding: 5px 10px;
            font-size: 10px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-accept {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
        }
        .btn-accept:hover { transform: scale(1.05); }
        
        .btn-request {
            background: var(--surface3);
            color: var(--text2);
        }
        .btn-request:hover {
            background: var(--accent);
            color: white;
        }
        
        /* Chat Main View */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text3);
            gap: 12px;
        }
        
        .empty-icon {
            font-size: 64px;
            opacity: 0.3;
        }
        
        .empty-text {
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Active Chat View */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        
        .chat-view.hidden {
            display: none;
        }
        
        .chat-header {
            height: 60px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            flex-shrink: 0;
        }
        
        .chat-header-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-avatar {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: 700;
        }
        
        .header-info { display: flex; flex-direction: column; gap: 2px; }
        .header-name { font-size: 14px; font-weight: 700; color: var(--text); }
        .header-status {
            font-size: 11px;
            color: var(--accent3);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        
        .pulse-dot {
            width: 6px; height: 6px;
            background: var(--accent3);
            border-radius: 50%;
            animation: breathe 2s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .chat-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 32px; height: 32px;
            border: none;
            background: var(--surface2);
            color: var(--text2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: var(--accent);
            color: white;
        }
        
        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .msg-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            transition: opacity 0.3s, transform 0.3s;
        }
        
        .msg-group.out {
            align-items: flex-end;
        }
        
        .msg-sender-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 12px;
        }
        
        .msg-bubble {
            background: var(--msg-in);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 400px;
            word-wrap: break-word;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .msg-group.out .msg-bubble {
            background: var(--msg-out);
            border-color: rgba(124, 107, 255, 0.2);
        }
        
        .timer-bar-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.05);
        }
        
        .timer-bar-fill {
            height: 100%;
            transition: width 1s linear, background 0.3s;
            box-shadow: 0 0 8px currentColor;
        }
        
        .msg-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 10px;
            color: var(--text3);
            padding: 0 12px;
        }
        
        .msg-time {
            font-weight: 500;
        }
        
        .msg-countdown {
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .msg-countdown.urgent {
            animation: blink 0.6s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .msg-vanishing {
            animation: fadeOut 0.5s ease forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.9) translateY(-10px);
            }
        }
        
        /* Input Area */
        .input-area {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .input-field {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .input-field::placeholder {
            color: var(--text3);
        }
        
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 107, 255, 0.1);
        }
        
        .btn-send {
            width: 44px;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(124, 107, 255, 0.4);
        }
        
        .btn-send:active {
            transform: scale(0.95);
        }
        
        /* Debug Panel - bottom right corner */
        .debug-panel {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            padding: 8px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            max-width: 300px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 9999;
            border: 1px solid #0f0;
        }
        
        .debug-panel::-webkit-scrollbar { width: 4px; }
        .debug-panel::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 2px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="logo">
            <span class="logo-icon">⚡</span>
            Chronicle
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/quickchat" class="active">FlashChat</a>
            <a href="/chat/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="chat-app">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <span>⚡</span>
                FlashChat
            </div>
        </div>
        
        <div class="search-bar">
            <input type="text" class="search-input" placeholder="Search chats..." id="searchInput">
        </div>
        
        <div class="section-label">Active Conversations</div>
        
        <div class="contact-list" id="contactList">
            <!-- Contacts rendered here -->
        </div>
    </div>
    
    <!-- Chat Main -->
    <div class="chat-main">
        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">💬</div>
            <div class="empty-text">Select a chat to start messaging</div>
        </div>
        
        <!-- Chat View -->
        <div class="chat-view hidden" id="chatView">
            <div class="chat-header">
                <div class="chat-header-user">
                    <div class="header-avatar" id="chatAvatar">U</div>
                    <div class="header-info">
                        <div class="header-name" id="chatName">User</div>
                        <div class="header-status">
                            <span class="pulse-dot"></span>
                            Online
                        </div>
                    </div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" title="Info">ℹ️</button>
                </div>
            </div>
            
            <div class="messages-area" id="messagesArea">
                <!-- Messages rendered here -->
            </div>
            
            <div class="input-area">
                <input 
                    type="text" 
                    class="input-field" 
                    placeholder="Type a message... (disappears in 30s)"
                    id="messageInput"
                    onkeypress="handleKeyPress(event)"
                >
                <button class="btn-send" onclick="sendMessage()">
                    ➤
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Debug Panel (optional) -->
<div class="debug-panel" id="debugPanel">
    <div id="debugLog">Debug output...</div>
</div>

<script>
    // FIX: Configuration
    const POLLING_INTERVAL = 2000; // FIX: Changed from 800ms to 2000ms (2 seconds) for better server performance
    const DEBUG_MODE = true;
    
    let currentUser = null;
    let currentChat = null;
    let currentChatId = null;
    let messageInterval = null;
    let messageElements = {}; // Track message IDs → DOM elements
    
    // Debug helper
    function debug(msg) {
        if (!DEBUG_MODE) return;
        const log = document.getElementById('debugLog');
        const timestamp = new Date().toLocaleTimeString();
        log.innerHTML = `[${timestamp}] ${msg}<br>` + log.innerHTML;
        
        // Keep only last 20 lines
        const lines = log.innerHTML.split('<br>');
        if (lines.length > 20) {
            log.innerHTML = lines.slice(0, 20).join('<br>');
        }
    }
    
    // FIX: Fetch current user with better error handling
    function fetchCurrentUser() {
        debug('Fetching current user...');
        return fetch('/api/chat/user', {
            credentials: 'include' // FIX: Important for session cookies
        })
        .then(r => {
            if (!r.ok) {
                debug('ERROR: Failed to fetch user, status: ' + r.status);
                if (r.status === 401) {
                    debug('Redirecting to login...');
                    window.location.href = '/auth';
                }
                throw new Error('HTTP ' + r.status);
            }
            return r.json();
        })
        .then(user => {
            currentUser = user;
            debug('Current user: ' + user.username + ' (ID: ' + user.id + ')');
            return user;
        })
        .catch(err => {
            debug('Error fetching current user: ' + err);
            throw err;
        });
    }
    
    // FIX: Fetch users with better error handling
    function fetchUsers() {
        debug('Fetching users list...');
        fetch('/api/chat/users', {
            credentials: 'include' // FIX: Important for session cookies
        })
        .then(r => {
            if (!r.ok) {
                debug('ERROR: Failed to fetch users, status: ' + r.status);
                if (r.status === 401) {
                    debug('Redirecting to login...');
                    window.location.href = '/auth';
                }
                throw new Error('HTTP ' + r.status);
            }
            return r.json();
        })
        .then(users => {
            debug('Received ' + users.length + ' users');
            renderUsers(users);
        })
        .catch(err => debug('Error fetching users: ' + err));
    }
    
    function renderUsers(users) {
        const list = document.getElementById('contactList');
        list.innerHTML = '';
        
        if (users.length === 0) {
            list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">No other users online</div>';
            return;
        }
        
        users.forEach(user => {
            const item = document.createElement('div');
            item.className = 'contact-item';
            
            const statusClass = user.online ? 'status-online' : 'status-offline';
            const hasRequest = user.has_request;
            const requestSent = user.request_sent;
            const chatActive = user.chat_active;
            
            let actionHtml = '';
            if (hasRequest) {
                actionHtml = `<button class="btn-mini btn-accept" onclick="acceptRequest('${user.id}', event)">Accept</button>`;
            } else if (chatActive) {
                actionHtml = `<button class="btn-mini btn-request" onclick="openChat('${user.id}', '${user.username}', '${user.chat_id}', event)" style="background: var(--accent); color: white;">Open</button>`;
            } else if (requestSent) {
                actionHtml = `<span style="font-size:10px;color:var(--text3);">Pending...</span>`;
            } else {
                actionHtml = `<button class="btn-mini btn-request" onclick="sendRequest('${user.id}', event)">Request</button>`;
            }
            
            item.innerHTML = `
                <div class="c-avatar">
                    ${user.username[0].toUpperCase()}
                    <div class="status-dot ${statusClass}"></div>
                    ${hasRequest ? '<div class="ftc-badge">!</div>' : ''}
                </div>
                <div class="c-info">
                    <div class="c-name">${escapeHtml(user.username)}</div>
                    <div class="c-preview">${user.online ? 'Online' : 'Offline'}</div>
                </div>
                <div class="c-actions">
                    ${actionHtml}
                </div>
            `;
            
            list.appendChild(item);
        });
    }
    
    function sendRequest(userId, event) {
        event.stopPropagation();
        debug('Sending request to user: ' + userId);
        
        fetch('/api/chat/request', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include', // FIX: Include credentials
            body: JSON.stringify({user_id: userId})
        })
        .then(r => r.json())
        .then(data => {
            debug('Request sent successfully');
            fetchUsers();
        })
        .catch(err => debug('Error sending request: ' + err));
    }
    
    function acceptRequest(userId, event) {
        event.stopPropagation();
        debug('Accepting request from user: ' + userId);
        
        fetch('/api/chat/request/accept', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include', // FIX: Include credentials
            body: JSON.stringify({user_id: userId})
        })
        .then(r => r.json())
        .then(data => {
            debug('Request accepted, chat_id: ' + data.chat_id);
            fetchUsers();
        })
        .catch(err => debug('Error accepting request: ' + err));
    }
    
    function openChat(userId, username, serverChatId, event) {
        if (event) event.stopPropagation();
        
        debug('Opening chat with: ' + username);
        
        const user = {
            id: userId,
            username: username
        };
        
        currentChat = user;
        
        // FIX: Always use server-provided chat_id if available
        if (serverChatId && serverChatId !== 'null' && serverChatId !== 'undefined') {
            currentChatId = serverChatId;
            debug('Using server chat_id: ' + currentChatId);
        } else {
            // This shouldn't happen for active chats, but fallback just in case
            currentChatId = [currentUser.id, user.id].sort().join('_');
            debug('WARNING: Using generated chat_id: ' + currentChatId);
        }
        
        // Show chat interface
        document.getElementById('emptyState').style.display = 'none';
        const chatView = document.getElementById('chatView');
        chatView.style.display = 'flex';
        chatView.classList.remove('hidden');
        
        document.getElementById('chatName').textContent = user.username;
        document.getElementById('chatAvatar').textContent = user.username[0].toUpperCase();
        
        // Clear messages
        document.getElementById('messagesArea').innerHTML = '';
        messageElements = {};
        
        // Load messages
        loadMessages(currentChatId);
        
        // FIX: Start polling with better interval
        if (messageInterval) clearInterval(messageInterval);
        messageInterval = setInterval(() => {
            loadMessages(currentChatId);
        }, POLLING_INTERVAL); // FIX: Using 2 second interval instead of 800ms
        
        setTimeout(() => document.getElementById('messageInput').focus(), 100);
    }

    function loadMessages(chatId) {
        debug('Loading messages for chat: ' + chatId);
        
        fetch(`/api/chat/messages/${chatId}`, {
            credentials: 'include' // FIX: Include credentials
        })
        .then(r => {
            if (!r.ok) {
                debug('ERROR: Failed to load messages, status: ' + r.status);
                if (r.status === 401) {
                    debug('Session expired, redirecting to login...');
                    window.location.href = '/auth';
                }
                throw new Error('HTTP ' + r.status);
            }
            return r.json();
        })
        .then(messages => {
            debug('Received ' + messages.length + ' messages from server');
            
            const area = document.getElementById('messagesArea');
            
            // Get IDs of messages currently in DOM
            const currentIds = Object.keys(messageElements);
            
            // Get IDs of messages from server
            const serverIds = messages.map(m => m.id);
            
            // FIX: Remove messages that are no longer on server (expired/deleted)
            currentIds.forEach(id => {
                if (!serverIds.includes(id)) {
                    debug('Message ' + id + ' expired, removing from DOM');
                    removeMessage(id);
                }
            });
            
            // Add or update messages from server
            messages.forEach(msg => {
                if (!messageElements[msg.id]) {
                    // Only add if less than 30 seconds old (double-check)
                    const age = (Date.now() - new Date(msg.created_at).getTime()) / 1000;
                    if (age < 30) {
                        debug('Adding new message: ' + msg.id);
                        addMessage(msg);
                    }
                } else {
                    // Update countdown for existing message
                    updateMessageCountdown(msg);
                }
            });
        })
        .catch(err => debug('Error loading messages: ' + err));
    }

    function addMessage(msg) {
        const area = document.getElementById('messagesArea');
        const isOut = msg.sender === currentUser.id;
        
        const group = document.createElement('div');
        group.className = `msg-group ${isOut ? 'out' : 'in'}`;
        group.id = `msg-${msg.id}`;
        
        const secondsLeft = msg.seconds_left || 30;
        const time = new Date(msg.created_at);
        const timeStr = time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        
        let color = 'var(--accent)';
        if (secondsLeft < 10) color = 'var(--flash)';
        if (secondsLeft < 5) color = 'var(--danger)';
        
        group.innerHTML = `
            <div class="msg-sender-label">${isOut ? 'You' : escapeHtml(msg.sender_name)}</div>
            <div class="msg-bubble">
                ${escapeHtml(msg.text)}
                <div class="timer-bar-wrap">
                    <div class="timer-bar-fill" id="bar-${msg.id}" style="width: ${(secondsLeft/30)*100}%; background: ${color}"></div>
                </div>
            </div>
            <div class="msg-meta">
                <span class="msg-time">${timeStr}</span>
                <span class="msg-countdown ${secondsLeft < 10 ? 'urgent' : ''}" id="count-${msg.id}" style="color: ${color}">
                    ${secondsLeft}s
                </span>
            </div>
        `;
        
        area.appendChild(group);
        area.scrollTop = area.scrollHeight;
        
        // Store and schedule removal
        messageElements[msg.id] = {
            element: group,
            addedAt: Date.now()
        };
        
        // Schedule removal based on server-provided expiry
        const removeDelay = secondsLeft * 1000;
        setTimeout(() => {
            removeMessage(msg.id);
        }, removeDelay);
        
        // Start visual countdown
        startCountdown(msg.id, secondsLeft);
    }

    function startCountdown(msgId, seconds) {
        let left = seconds;
        const countdownEl = document.getElementById(`count-${msgId}`);
        const barEl = document.getElementById(`bar-${msgId}`);
        
        const interval = setInterval(() => {
            left--;
            
            if (countdownEl) {
                countdownEl.textContent = left + 's';
                let color = 'var(--accent)';
                if (left < 10) {
                    color = 'var(--flash)';
                    countdownEl.classList.add('urgent');
                }
                if (left < 5) color = 'var(--danger)';
                countdownEl.style.color = color;
            }
            
            if (barEl) {
                barEl.style.width = (left/30)*100 + '%';
                if (left < 5) barEl.style.background = 'var(--danger)';
            }
            
            if (left <= 0) clearInterval(interval);
        }, 1000);
    }

    function updateMessageCountdown(msg) {
        const secondsLeft = msg.seconds_left || 30;
        const countdownEl = document.getElementById(`count-${msg.id}`);
        const barEl = document.getElementById(`bar-${msg.id}`);
        
        if (countdownEl) countdownEl.textContent = secondsLeft + 's';
        if (barEl) barEl.style.width = (secondsLeft/30)*100 + '%';
    }

    function removeMessage(msgId) {
        const msgData = messageElements[msgId];
        if (msgData && msgData.element) {
            msgData.element.classList.add('msg-vanishing');
            
            setTimeout(() => {
                if (msgData.element && msgData.element.parentNode) {
                    msgData.element.parentNode.removeChild(msgData.element);
                }
                delete messageElements[msgId];
                debug('Message ' + msgId + ' fully removed');
            }, 500);
        } else {
            delete messageElements[msgId];
        }
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChatId) {
            debug('Cannot send: no text or no chat');
            return;
        }
        
        debug('Sending message to chat: ' + currentChatId);
        input.value = '';
        
        fetch('/api/chat/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            credentials: 'include', // FIX: Include credentials
            body: JSON.stringify({chat_id: currentChatId, text: text})
        })
        .then(r => {
            if (!r.ok) {
                debug('ERROR: Failed to send message, status: ' + r.status);
                if (r.status === 401) {
                    debug('Session expired, redirecting to login...');
                    window.location.href = '/auth';
                }
                throw new Error('HTTP ' + r.status);
            }
            return r.json();
        })
        .then(data => {
            debug('Message sent, id: ' + data.id);
            // Immediately load messages to show our message
            loadMessages(currentChatId);
        })
        .catch(err => {
            debug('Error sending message: ' + err);
            input.value = text; // Restore message on error
        });
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // FIX: Initialize app with better error handling
    async function initApp() {
        try {
            debug('Initializing app...');
            await fetchCurrentUser();
            fetchUsers();
            
            // Refresh user list periodically
            setInterval(fetchUsers, 5000); // FIX: Refresh every 5 seconds instead of constantly
            
            debug('App initialized successfully');
        } catch (err) {
            debug('Failed to initialize app: ' + err);
        }
    }
    
    // Start app when page loads
    document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
</html>
