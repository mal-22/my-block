
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FlashChat - Chronicle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #18181f;
            --surface3: #1e1e28;
            --border: #2a2a38;
            --border2: #333345;
            --text: #f0eeff;
            --text2: #8b8aa8;
            --text3: #55546a;
            --accent: #7c6bff;
            --accent2: #ff6b9d;
            --accent3: #00d4aa;
            --flash: #ffb800;
            --danger: #ff4444;
            --msg-out: #1e1b3a;
            --msg-in: #1a1a22;
        }
        
        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        /* Navigation - Compact */
        .navbar {
            height: 50px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            background: var(--surface);
            flex-shrink: 0;
        }
        
        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        
        .logo {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logo-icon { color: var(--accent); }
        
        .nav-links {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }
        
        .nav-links a {
            color: var(--text2);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }
        
        /* Main App - Full height without scroll */
        .chat-app {
            display: flex;
            height: calc(100vh - 50px);
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar-brand {
            font-size: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .search-bar {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .search-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text);
            outline: none;
            font-family: 'Outfit', sans-serif;
        }
        
        .search-input::placeholder { color: var(--text3); }
        .search-input:focus { border-color: var(--accent); }
        
        .section-label {
            padding: 10px 15px 5px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text3);
        }
        
        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }
        
        .contact-list::-webkit-scrollbar { width: 4px; }
        .contact-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
            margin-bottom: 4px;
        }
        
        .contact-item:hover { background: var(--surface2); }
        .contact-item.active { background: var(--surface3); }
        
        .c-avatar {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--surface3);
            position: relative;
            flex-shrink: 0;
        }
        
        .status-dot {
            position: absolute;
            bottom: -2px; right: -2px;
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid var(--surface);
        }
        .status-online { background: var(--accent3); }
        .status-offline { background: var(--border2); }
        
        .ftc-badge {
            position: absolute;
            top: -3px; right: -3px;
            width: 16px; height: 16px;
            background: var(--accent2);
            border-radius: 50%;
            border: 2px solid var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,107,157,0.5); }
            50% { box-shadow: 0 0 0 4px rgba(255,107,157,0); }
        }
        
        .c-info { flex: 1; min-width: 0; }
        
        .c-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .c-preview {
            font-size: 11px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }
        
        .c-actions {
            display: flex;
            gap: 6px;
        }
        
        .btn-mini {
            padding: 5px 10px;
            font-size: 10px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-accept {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
        }
        .btn-accept:hover { transform: scale(1.05); }
        
        .btn-request {
            background: var(--surface3);
            color: var(--text2);
        }
        .btn-request:hover {
            background: var(--accent);
            color: white;
        }
        
        /* Chat Main View */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
        }
        
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text3);
            gap: 12px;
        }
        
        .empty-icon {
            font-size: 64px;
            opacity: 0.3;
        }
        
        .empty-text {
            font-size: 14px;
            font-weight: 500;
        }
        
        /* Active Chat View */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        
        .chat-view.hidden {
            display: none;
        }
        
        .chat-header {
            height: 60px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            flex-shrink: 0;
        }
        
        .chat-header-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-avatar {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-weight: 700;
        }
        
        .header-info { display: flex; flex-direction: column; gap: 2px; }
        .header-name { font-size: 14px; font-weight: 700; color: var(--text); }
        .header-status {
            font-size: 11px;
            color: var(--accent3);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        
        .pulse-dot {
            width: 6px; height: 6px;
            background: var(--accent3);
            border-radius: 50%;
            animation: breathe 2s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .chat-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 32px; height: 32px;
            border: none;
            background: var(--surface2);
            color: var(--text2);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: var(--accent);
            color: white;
        }
        
        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .messages-area::-webkit-scrollbar { width: 6px; }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .msg-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            transition: opacity 0.3s, transform 0.3s;
        }
        
        .msg-group.out {
            align-items: flex-end;
        }
        
        .msg-sender-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 12px;
        }
        
        .msg-bubble {
            background: var(--msg-in);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 400px;
            word-wrap: break-word;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .msg-group.out .msg-bubble {
            background: var(--msg-out);
            border-color: rgba(124, 107, 255, 0.2);
        }
        
        .timer-bar-wrap {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255,255,255,0.05);
        }
        
        .timer-bar-fill {
            height: 100%;
            transition: width 1s linear, background 0.3s;
            box-shadow: 0 0 8px currentColor;
        }
        
        .msg-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 10px;
            color: var(--text3);
            padding: 0 12px;
        }
        
        .msg-time {
            font-weight: 500;
        }
        
        .msg-countdown {
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .msg-countdown.urgent {
            animation: blink 0.6s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .msg-vanishing {
            animation: fadeOut 0.5s ease forwards;
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: scale(0.9) translateY(-10px);
            }
        }
        
        /* Input Area */
        .input-area {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .input-field {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 13px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .input-field::placeholder {
            color: var(--text3);
        }
        
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 107, 255, 0.1);
        }
        
        .btn-send {
            width: 44px;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .btn-send:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(124, 107, 255, 0.4);
        }
        
        .btn-send:active {
            transform: scale(0.95);
        }
        /* profile */
        .sidebar-footer {
            padding: 10px 15px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .me-avatar {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            flex-shrink: 0;
        }
        
        .me-info { flex: 1; }
        .me-name { font-size: 12px; font-weight: 600; color: var(--text); }
        .me-status { font-size: 10px; color: var(--accent3); }
        
        
        /* Debug Panel - bottom right corner */
        .debug-panel {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            padding: 8px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            max-width: 300px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 9999;
            border: 1px solid #0f0;
        }
        
        .debug-panel::-webkit-scrollbar { width: 4px; }
        .debug-panel::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    
<nav class="navbar">
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="nav-container">
    <a href="/" class="logo">Chronicle</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/quickchat" class="active">QuickChat</a>
      <a href="/chat/logout">Logout</a>
      <div class="chat-actions">
        <!-- Single bell button -->
        <button class="icon-btn" id="notifButton" title="Friend requests">
          🔔
          <span class="notif-badge" id="notifBadge" style="
            display:none;
            margin-left:4px;
            background:var(--accent2);
            color:white;
            border-radius:999px;
            padding:0 6px;
            font-size:10px;
            font-weight:700;
          "></span>
        </button>

        <!-- Dropdown for requests -->
        <div id="notifDropdown" style="
          position:absolute;
          right:20px;
          top:50px;
          background:var(--surface2);
          border:1px solid var(--border);
          border-radius:8px;
          padding:8px 0;
          min-width:220px;
          box-shadow:0 4px 16px rgba(0,0,0,0.4);
          display:none;
          z-index:999;
          font-size:12px;
        "></div>

        <button class="icon-btn" title="Info">
          ℹ️
        </button>
      </div>

    </div>
  </div>
</nav>

<!-- Single Messenger-style layout -->
<div class="chat-app">
  <!-- Sidebar: conversations list -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <span>⚡</span>
        QuickChat
      </div>
    </div>

    <div class="search-bar">
      <input
        type="text"
        class="search-input"
        placeholder="Search chats..."
        id="searchInput"
      >
    </div>

    <div class="section-label">Active Conversations</div>
    
    <div class="contact-list" id="contactList">
      <!-- Contacts rendered here by JS -->
    </div>
    <div class="sidebar-footer">
        <div class="me-avatar" id="currentAvatar">👤</div>
        <div class="me-info">
            <div class="me-name" id="currentUsername">You</div>
            <div class="me-status">● Online</div>
        </div>
    </div>
    
  </aside>

  <!-- Main chat pane -->
  <main class="chat-main" id="chatMain">
    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-text">Select a chat to start messaging</div>
    </div>

    <!-- Chat View -->
    <div class="chat-view hidden" id="chatView">
      <div class="chat-header">
        <div class="chat-header-user">
          <div class="header-avatar" id="chatAvatar"></div>
          <div class="header-info">
          <div class="header-name" id="chatName"></div>
            <div class="header-status">
              <span class="pulse-dot"></span>
              Online
            </div>
          </div>
        </div>
        <div class="chat-actions">
          <button class="icon-btn" title="Info">ℹ️</button>
        </div>
      </div>

      <div class="messages-area" id="messagesArea">
        <!-- Messages rendered here by JS -->
      </div>

      <div class="input-area">
        <input
          type="text"
          class="input-field"
          placeholder="Type a message... (disappears in 30s)"
          id="messageInput"
          onkeypress="handleKeyPress(event)"
        >
        <button class="btn-send" onclick="sendMessage()">
          ➤
        </button>
      </div>
    </div>
  </main>
</div>


<!-- Debug Panel (optional) -->
<div class="debug-panel" id="debugPanel">
    <div id="debugLog">Debug output...</div>
</div>

<script>
    window.config = {
        SUPABASE_URL: "{{ config.SUPABASE_URL }}",
        SUPABASE_ANON_KEY: "{{ config.SUPABASE_ANON_KEY }}"
    };
    // FIX: Configuration
    const POLLING_INTERVAL = 2000; // FIX: Changed from 800ms to 2000ms (2 seconds) for better server performance
    const DEBUG_MODE = true;
    
    let currentUser = null;
    let currentChat = null;
    let currentChatId = null;
    let messageInterval = null;
    let allUsers = [];
    let isSearching = false;
    let messageElements = {}; // Track message IDs → DOM elements
    
    // Debug helper
    function debug(msg) {
        if (!DEBUG_MODE) return;
        const log = document.getElementById('debugLog');
        const timestamp = new Date().toLocaleTimeString();
        log.innerHTML = `[${timestamp}] ${msg}<br>` + log.innerHTML;
        
        // Keep only last 20 lines
        const lines = log.innerHTML.split('<br>');
        if (lines.length > 20) {
            log.innerHTML = lines.slice(0, 20).join('<br>');
        }
    }
    // Mobile sidebar toggle with overlay
    function toggleSidebar() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    // Close sidebar when clicking overlay or a contact
    document.addEventListener('click', (e) => {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (e.target === overlay) {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }
        
        // Close sidebar when selecting a contact on mobile
        if (window.innerWidth <= 768 && e.target.closest('.contact-item')) {
            setTimeout(() => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            }, 100);
        }
    });

    // Prevent zoom on double-tap for iOS
    let lastTouchEnd = 0;
    document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) {
            e.preventDefault();
        }
        lastTouchEnd = now;
    }, { passive: false });

    // Handle keyboard appearance on mobile (resize handling)
    let initialHeight = window.innerHeight;
    window.addEventListener('resize', () => {
        const chatApp = document.querySelector('.chat-app');
        const messagesArea = document.getElementById('messagesArea');
        
        if (window.innerHeight < initialHeight * 0.8) {
            // Keyboard likely opened
            setTimeout(() => {
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }, 300);
        }
    });

    // Swipe gesture to open sidebar
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, { passive: true });

    function handleSwipe() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        // Swipe right from left edge to open
        if (touchEndX - touchStartX > 100 && touchStartX < 50) {
            sidebar.classList.add('active');
            overlay.classList.add('active');
        }
        
        // Swipe left to close
        if (touchStartX - touchEndX > 100 && sidebar.classList.contains('active')) {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }
    }
    
    // FIX: Fetch current user with better error handling
    function fetchCurrentUser() {
        debug('Fetching current user...');
        return fetch('/api/chat/user', {
            credentials: 'include' // FIX: Important for session cookies
        })
        .then(r => {
            if (!r.ok) {
                debug('ERROR: Failed to fetch user, status: ' + r.status);
                if (r.status === 401) {
                    debug('Redirecting to login...');
                    window.location.href = '/login';
                }
                throw new Error('HTTP ' + r.status);
            }
            return r.json();
        })
        .then(user => {
            currentUser = user;
            debug('Current user: ' + user.username + ' (ID: ' + user.id + ')');
            return user;
        })
        .then(user => {
                currentUser = user;
                debug('Current user: ' + user.username + ' (ID: ' + user.id + ')');
                
                // Update sidebar footer right here
                const usernameEl = document.getElementById('currentUsername');
                const avatarEl = document.getElementById('currentAvatar');
                if (usernameEl) usernameEl.textContent = user.username;
                if (avatarEl) avatarEl.textContent = user.username[0].toUpperCase();
                
                return user;
            })
        .catch(err => {
            debug('Error fetching current user: ' + err);
            throw err;
        });
    }
    
    // FIX: Fetch users with better error handling

    function fetchUsers() {
      if (isSearching) {
        // Don’t override global search results
        return;
      }

      debug('Fetching users list (friends only)...');
      fetch('/api/chat/users', { credentials: 'include' })
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(users => {
          if (!Array.isArray(users)) users = [];
          allUsers = users;
          renderUsers(users);
        })
        .catch(err => debug('Error fetching users', err));
    }

    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.addEventListener('input', e => {
        const q = e.target.value.trim();

        if (!q) {
          // Back to friends mode
          isSearching = false;
          fetchUsers();
          return;
        }

        isSearching = true;
        debug('Searching users:', q);
        fetch('/api/chat/users/search?q=' + encodeURIComponent(q), {
          credentials: 'include'
        })
          .then(r => {
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
          })
          .then(users => {
            if (!Array.isArray(users)) users = [];
            renderUsers(users);
          })
          .catch(err => debug('Error searching users', err));
      });
    }


    document.addEventListener('DOMContentLoaded', () => {
      const notifButton = document.getElementById('notifButton');
      const notifDropdown = document.getElementById('notifDropdown');

      if (notifButton && notifDropdown) {
        notifButton.addEventListener('click', e => {
          e.stopPropagation();
          toggleNotifDropdown();
        });

        document.addEventListener('click', e => {
          if (!notifDropdown.contains(e.target) && e.target !== notifButton) {
            notifDropdown.style.display = 'none';
          }
        });
      }
    });
    
    function toggleNotifDropdown() {
      const dropdown = document.getElementById('notifDropdown');
      if (!dropdown) return;

      if (dropdown.style.display === 'block') {
        dropdown.style.display = 'none';
        return;
      }

      // Filter users who sent me a request
      const requesters = allUsers.filter(u => u.hasrequest);

      if (requesters.length === 0) {
        dropdown.innerHTML =
          '<div style="padding:8px 12px;color:var(--text3);">No pending requests</div>';
      } else {
        dropdown.innerHTML = requesters.map(u => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 12px;gap:8px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <div style="
                width:24px;height:24px;border-radius:6px;
                background:var(--surface3);display:flex;
                align-items:center;justify-content:center;
                font-size:12px;
              ">
                ${u.username ? u.username[0].toUpperCase() : '?'}
              </div>
              <div>
                <div style="font-weight:600;color:var(--text);">${escapeHtml(u.username || 'Unknown')}</div>
                <div style="font-size:10px;color:var(--text3);">
                  ${u.online ? 'Online' : 'Offline'}
                </div>
              </div>
            </div>
            <button class="btn-mini btn-accept"
              style="font-size:10px;padding:4px 8px;"
              onclick="acceptFromNotif('${u.id}', event)">
              Accept
            </button>
          </div>
        `).join('');
      }

      dropdown.style.display = 'block';
    }
    
    function acceptFromNotif(userId, event) {
      if (event) event.stopPropagation();
      acceptRequest(userId, event);
      const dropdown = document.getElementById('notifDropdown');
      if (dropdown) dropdown.style.display = 'none';
    }



    function applySearchFilter() {
      const term = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!term) {
        renderUsers(allUsers);
        return;
      }
      const filtered = allUsers.filter(u =>
        u.username && u.username.toLowerCase().includes(term)
      );
      renderUsers(filtered);
    }

    document.getElementById('searchInput')
      .addEventListener('input', applySearchFilter);
    
    function renderUsers(users) {
      const list = document.getElementById('contactList');
      list.innerHTML = '';

      if (!users || users.length === 0) {
        list.innerHTML =
          '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px;">No users found</div>';
        return;
      }

      users.forEach(user => {
        const item = document.createElement('div');
        item.className = 'contact-item';

        const statusClass = user.online ? 'status-online' : 'status-offline';
        const hasRequest = user.hasrequest;
        const requestSent = user.requestsent;
        const chatActive = user.chatactive;
        const chatId = user.chatid;

        let actionHtml;
        if (hasRequest) {
          actionHtml =
            `<button class="btn-mini btn-accept" onclick="acceptRequest('${user.id}', event)">Accept</button>`;
        } else if (chatActive && chatId) {
          actionHtml =
            `<button class="btn-mini btn-request" onclick="openChat('${user.id}', '${user.username}', '${chatId}', event)" style="background:var(--accent);color:white;">Open</button>`;
        } else if (requestSent) {
          actionHtml = `<span style="font-size:10px;color:var(--text3);">Pending...</span>`;
        } else {
          actionHtml =
            `<button class="btn-mini btn-request" onclick="sendRequest('${user.id}', event)">Request</button>`;
        }

        item.innerHTML = `
          <div class="c-avatar">
            ${user.username ? user.username[0].toUpperCase() : '?'}
            <div class="status-dot ${statusClass}"></div>
            ${hasRequest ? '<div class="ftc-badge">!</div>' : ''}
          </div>
          <div class="c-info">
            <div class="c-name">${escapeHtml(user.username || 'Unknown')}</div>
            <div class="c-preview">${user.online ? 'Online' : 'Offline'}</div>
          </div>
          <div class="c-actions">
            ${actionHtml}
          </div>
        `;

        item.addEventListener('click', e => {
          if (chatActive && chatId) {
            openChat(user.id, user.username, chatId, e);
          }
        });

        list.appendChild(item);
      });
    }

    
    function sendRequest(userId, event) {
      event.stopPropagation();
      debug('Sending request to user', userId);
      fetch('/api/chat/request', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ userid: userId })
      })
        .then(r => r.json())
        .then(data => {
          debug('Request sent successfully', data);
          fetchUsers(); // refresh list
        })
        .catch(err => debug('Error sending request', err));
    }

    function acceptRequest(userId, event) {
      event.stopPropagation();
      debug('Accepting request from user', userId);
      fetch('/api/chat/request/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ userid: userId })
      })
        .then(r => r.json())
        .then(data => {
          debug('Request accepted, chatid', data.chatid);
          fetchUsers();        // this is what causes button to change to Open
          refreshNotifications();
        })
        .catch(err => debug('Error accepting request', err));
    }


    function refreshNotifications() {
      fetch('/api/chat/requests', { credentials: 'include' })
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(data => {
          const count = data && typeof data.count === 'number' ? data.count : 0;
          const badge = document.getElementById('notifBadge');
          if (!badge) return;
          if (count > 0) {
            badge.style.display = 'inline-block';
            badge.textContent = count;
          } else {
            badge.style.display = 'none';
          }
        })
        .catch(err => debug('Error fetching notifications', err));
    }

    document.addEventListener('DOMContentLoaded', () => {
      const notifButton = document.getElementById('notifButton');
      if (notifButton) {
          notifButton.addEventListener('click', () => {
          // For now just focus the sidebar; you can later open a dedicated modal
          fetchUsers();
          setTimeout(() => {
                 const firstReq = Array.from(document.querySelectorAll('.contact-item'))
                   .find(item => item.querySelector('.ftc-badge'));
                 if (firstReq) {
                   firstReq.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                 }
               }, 200);
          document.querySelector('.sidebar')?.classList.add('active');
          document.getElementById('sidebarOverlay')?.classList.add('active');
        });
      }

      // existing initApp already calls fetchCurrentUser & fetchUsers
      // here we just start notifications polling
      setInterval(refreshNotifications, 5000);
      refreshNotifications();
    });
    
    function openChat(userId, username, serverChatId, event) {
      if (window.innerWidth <= 768) {
        document.querySelector('.sidebar')?.classList.remove('active');
        document.getElementById('sidebarOverlay')?.classList.remove('active');
      }

      if (event) event.stopPropagation();

      debug('Opening chat with: ' + username);

      const user = { id: userId, username };
      currentChat = user;
      if (serverChatId && serverChatId !== 'null' && serverChatId !== 'undefined') {
        currentChatId = serverChatId;
      } else {
        currentChatId = [currentUser.id, user.id].sort().join('-');
        debug('WARNING: Using generated chat_id: ' + currentChatId);
      }

      document.getElementById('emptyState').style.display = 'none';
      const chatView = document.getElementById('chatView');
      chatView.style.display = 'flex';
      chatView.classList.remove('hidden');

      const nameEl = document.getElementById('chatName');
      const avatarEl = document.getElementById('chatAvatar');
      if (nameEl) nameEl.textContent = user.username;
      if (avatarEl) avatarEl.textContent = user.username[0].toUpperCase();

      document.getElementById('messagesArea').innerHTML = '';
      messageElements = {};

      loadMessages(currentChatId);

      if (messageInterval) clearInterval(messageInterval);
      messageInterval = setInterval(() => {
        loadMessages(currentChatId);
      }, POLLING_INTERVAL);

      setTimeout(() => document.getElementById('messageInput').focus(), 100);
    }



    function loadMessages(chatId) {
        debug('Loading messages for chat: ' + chatId);
        
        fetch(`/api/chat/messages/${chatId}`, {
            credentials: 'include' // FIX: Include credentials
        })
        .then(r => {
            if (!r.ok) {
                debug('ERROR: Failed to load messages, status: ' + r.status);
                if (r.status === 401) {
                    debug('Session expired, redirecting to login...');
                    window.location.href = '/login';
                }
                throw new Error('HTTP ' + r.status);
            }
            return r.json();
        })
        .then(messages => {
            debug('Received ' + messages.length + ' messages from server');
            
            const area = document.getElementById('messagesArea');
            
            // Get IDs of messages currently in DOM
            const currentIds = Object.keys(messageElements);
            
            // Get IDs of messages from server
            const serverIds = messages.map(m => m.id);
            
            // FIX: Remove messages that are no longer on server (expired/deleted)
            currentIds.forEach(id => {
                if (!serverIds.includes(id)) {
                    debug('Message ' + id + ' expired, removing from DOM');
                    removeMessage(id);
                }
            });
            
            // Add or update messages from server
            messages.forEach(msg => {
                if (!messageElements[msg.id]) {
                    // Only add if less than 30 seconds old (double-check)
                    const age = (Date.now() - new Date(msg.createdat).getTime()) / 1000;


                    if (age < 30) {
                        debug('Adding new message: ' + msg.id);
                        addMessage(msg);
                    }
                } else {
                    // Update countdown for existing message
                    updateMessageCountdown(msg);
                }
            });
        })
        .catch(err => debug('Error loading messages: ' + err));
    }

    function addMessage(msg) {
        const area = document.getElementById('messagesArea');
        const isOut = msg.sender === currentUser.id;
        
        const group = document.createElement('div');
        group.className = `msg-group ${isOut ? 'out' : 'in'}`;
        group.id = `msg-${msg.id}`;
        
        const secondsLeft = msg.secondsleft || 30;
        const time = new Date(msg.createdat);
        const timeStr = time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        
        let color = 'var(--accent)';
        if (secondsLeft < 10) color = 'var(--flash)';
        if (secondsLeft < 5) color = 'var(--danger)';
        
        group.innerHTML = `
            <div class="msg-sender-label">
              ${isOut ? 'You' : escapeHtml(msg.sendername || 'Unknown')}
            </div>
            <div class="msg-bubble">
                ${escapeHtml(msg.text)}
                <div class="timer-bar-wrap">
                    <div class="timer-bar-fill" id="bar-${msg.id}" style="width: ${(secondsLeft/30)*100}%; background: ${color}"></div>
                </div>
            </div>
            <div class="msg-meta">
                <span class="msg-time">${timeStr}</span>
                <span class="msg-countdown ${secondsLeft < 10 ? 'urgent' : ''}" id="count-${msg.id}" style="color: ${color}">
                    ${secondsLeft}s
                </span>
            </div>
        `;
        
        area.appendChild(group);
        area.scrollTop = area.scrollHeight;
        
        // Store and schedule removal
        messageElements[msg.id] = {
            element: group,
            addedAt: Date.now()
        };
        
        // Schedule removal based on server-provided expiry
        const removeDelay = secondsLeft * 1000;
        setTimeout(() => {
            removeMessage(msg.id);
        }, removeDelay);
        
        // Start visual countdown
        startCountdown(msg.id, secondsLeft);
    }

    function startCountdown(msgId, seconds) {
        let left = seconds;
        const countdownEl = document.getElementById(`count-${msgId}`);
        const barEl = document.getElementById(`bar-${msgId}`);
        
        const interval = setInterval(() => {
            left--;
            
            if (countdownEl) {
                countdownEl.textContent = left + 's';
                let color = 'var(--accent)';
                if (left < 10) {
                    color = 'var(--flash)';
                    countdownEl.classList.add('urgent');
                }
                if (left < 5) color = 'var(--danger)';
                countdownEl.style.color = color;
            }
            
            if (barEl) {
                barEl.style.width = (left/30)*100 + '%';
                if (left < 5) barEl.style.background = 'var(--danger)';
            }
            
            if (left <= 0) clearInterval(interval);
        }, 1000);
    }

    function updateMessageCountdown(msg) {
        const secondsLeft = msg.secondsleft || 30;
        const countdownEl = document.getElementById(`count-${msg.id}`);
        const barEl = document.getElementById(`bar-${msg.id}`);
        
        if (countdownEl) countdownEl.textContent = secondsLeft + 's';
        if (barEl) barEl.style.width = (secondsLeft/30)*100 + '%';
    }

    function removeMessage(msgId) {
        const msgData = messageElements[msgId];
        if (msgData && msgData.element) {
            msgData.element.classList.add('msg-vanishing');
            
            setTimeout(() => {
                if (msgData.element && msgData.element.parentNode) {
                    msgData.element.parentNode.removeChild(msgData.element);
                }
                delete messageElements[msgId];
                debug('Message ' + msgId + ' fully removed');
            }, 500);
        } else {
            delete messageElements[msgId];
        }
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !currentChatId) {
        debug('Cannot send: no text or no chat');
        return;
      }

      debug('Sending message to chat', currentChatId);
      fetch('/api/chat/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ chatid: currentChatId, text })
      })
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(data => {
        debug('Message sent, id', data.id);
        loadMessages(currentChatId);
      })
      .catch(err => debug('Error sending message', err));

      input.value = '';
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // FIX: Initialize app with better error handling
    async function initApp() {
        try {
            debug('Initializing app...');
            await fetchCurrentUser();
            fetchUsers();
            
            // Refresh user list periodically
            setInterval(fetchUsers, 5000); // FIX: Refresh every 5 seconds instead of constantly
            
            debug('App initialized successfully');
        } catch (err) {
            debug('Failed to initialize app: ' + err);
        }
    }
    
    // Start app when page loads
    document.addEventListener('DOMContentLoaded', initApp);
</script>

</body>
