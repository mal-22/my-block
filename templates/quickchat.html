<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashChat - Chronicle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #18181f;
            --surface3: #1e1e28;
            --border: #2a2a38;
            --border2: #333345;
            --text: #f0eeff;
            --text2: #8b8aa8;
            --text3: #55546a;
            --accent: #7c6bff;
            --accent2: #ff6b9d;
            --accent3: #00d4aa;
            --flash: #ffb800;
            --danger: #ff4444;
            --msg-out: #1e1b3a;
            --msg-in: #1a1a22;
        }
        
        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        /* Navigation - Compact */
        .navbar {
            height: 50px;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            background: var(--surface);
            flex-shrink: 0;
        }
        
        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        
        .logo {
            color: var(--text);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .logo-icon { color: var(--accent); }
        
        .nav-links {
            display: flex;
            gap: 20px;
            margin-left: auto;
        }
        
        .nav-links a {
            color: var(--text2);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }
        
        /* Main App - Full height without scroll */
        .chat-app {
            display: flex;
            height: calc(100vh - 50px);
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        
        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar-brand {
            font-size: 16px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .search-bar {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
        }
        
        .search-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text);
            outline: none;
            font-family: 'Outfit', sans-serif;
        }
        
        .search-input::placeholder { color: var(--text3); }
        .search-input:focus { border-color: var(--accent); }
        
        .section-label {
            padding: 10px 15px 5px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text3);
        }
        
        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
        }
        
        .contact-list::-webkit-scrollbar { width: 4px; }
        .contact-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
            margin-bottom: 4px;
        }
        
        .contact-item:hover { background: var(--surface2); }
        .contact-item.active { background: var(--surface3); }
        
        .c-avatar {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--surface3);
            position: relative;
            flex-shrink: 0;
        }
        
        .status-dot {
            position: absolute;
            bottom: -2px; right: -2px;
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid var(--surface);
        }
        .status-online { background: var(--accent3); }
        .status-offline { background: var(--border2); }
        
        .ftc-badge {
            position: absolute;
            top: -3px; right: -3px;
            width: 16px; height: 16px;
            background: var(--accent2);
            border-radius: 50%;
            border: 2px solid var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(255,107,157,0.5); }
            50% { box-shadow: 0 0 0 4px rgba(255,107,157,0); }
        }
        
        .c-info { flex: 1; min-width: 0; }
        
        .c-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .c-preview {
            font-size: 11px;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }
        
        .c-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            flex-shrink: 0;
        }
        
        .request-btn {
            width: 28px; height: 28px;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .request-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(124,107,255,0.4);
        }
        
        .request-btn.sent {
            background: var(--flash);
            cursor: default;
        }
        
        .ftc-ping-badge {
            background: var(--accent2);
            color: white;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 100px;
        }
        
        .sidebar-footer {
            padding: 10px 15px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .me-avatar {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            flex-shrink: 0;
        }
        
        .me-info { flex: 1; }
        .me-name { font-size: 12px; font-weight: 600; color: var(--text); }
        .me-status { font-size: 10px; color: var(--accent3); }
        
        /* Chat Area - Fit screen */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            min-width: 0;
        }
        
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text2);
        }
        
        .empty-icon { font-size: 48px; opacity: 0.3; }
        .empty-title { font-size: 18px; font-weight: 700; color: var(--text3); }
        .empty-sub { font-size: 12px; color: var(--text3); text-align: center; line-height: 1.5; }
        
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            flex-shrink: 0;
        }
        
        .chat-header-avatar {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--surface2);
        }
        
        .chat-header-info { flex: 1; }
        
        .chat-header-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }
        
        .chat-header-sub {
            font-size: 11px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        
        .flash-warning {
            font-size: 10px;
            color: var(--flash);
            font-weight: 600;
            background: rgba(255,184,0,0.1);
            padding: 2px 8px;
            border-radius: 100px;
        }
        
        /* Messages - Scrollable area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        
        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            animation: msgIn 0.3s ease;
            max-width: 75%;
        }
        
        @keyframes msgIn {
            from { opacity:0; transform:translateY(8px); }
            to { opacity:1; transform:translateY(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.9); max-height: 0; margin: 0; padding: 0; }
        }
        
        .msg-group.out { align-self: flex-end; align-items: flex-end; }
        .msg-group.in { align-self: flex-start; align-items: flex-start; }
        
        .msg-vanishing {
            animation: fadeOut 0.5s ease forwards !important;
        }
        
        .msg-sender-label {
            font-size: 10px;
            color: var(--text3);
            font-weight: 500;
            padding: 0 4px;
        }
        
        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .msg-group.out .msg-bubble {
            background: var(--msg-out);
            border: 1px solid rgba(124,107,255,0.25);
            border-bottom-right-radius: 4px;
            color: var(--text);
        }
        
        .msg-group.in .msg-bubble {
            background: var(--msg-in);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }
        
        .timer-bar-wrap {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .timer-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            transition: width 1s linear;
        }
        
        .msg-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 4px;
            margin-top: 2px;
        }
        
        .msg-time {
            font-size: 9px;
            color: var(--text3);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .msg-countdown {
            font-size: 9px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            padding: 1px 6px;
            border-radius: 100px;
            background: rgba(255,184,0,0.1);
            color: var(--flash);
            min-width: 36px;
            text-align: center;
        }
        
        .msg-countdown.urgent {
            background: rgba(255,68,68,0.15);
            color: var(--danger);
            animation: pulse 0.5s ease-in-out infinite alternate;
        }
        
        /* Input - Fixed at bottom */
        .input-bar {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text);
            outline: none;
            font-family: 'Outfit', sans-serif;
        }
        
        .chat-input:focus { border-color: var(--accent); }
        .chat-input::placeholder { color: var(--text3); }
        
        .send-btn {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), #9b6bff);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .send-btn:hover { transform: scale(1.05); }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: var(--surface);
            padding: 30px;
            border-radius: 16px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: var(--accent2);
            font-weight: 800;
        }
        
        .modal-text {
            color: var(--text2);
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .modal-btn.accept {
            background: linear-gradient(135deg, var(--accent), #9b6bff);
            color: white;
        }
        
        .modal-btn.decline {
            background: var(--surface2);
            color: var(--text2);
            border: 1px solid var(--border);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-icon">◆</span>
        Chronicle
      </a>
      <div class="nav-links">
        <a href="/">Articles</a>
        <a href="/write">Write</a>
        <a href="/chat" class="active">💬 Chat</a>
        <a href="/chat/logout">Logout</a>
      </div>
    </div>
  </nav>

  <div class="chat-app">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">⚡ FlashChat</div>
        </div>
        
        <div class="search-bar">
            <input class="search-input" id="searchInput" placeholder="Search users..." onkeyup="filterUsers()">
        </div>
        
        <div class="section-label">Users</div>
        
        <div class="contact-list" id="userList"></div>
        
        <div class="sidebar-footer">
            <div class="me-avatar" id="currentAvatar">👤</div>
            <div class="me-info">
                <div class="me-name" id="currentUsername">You</div>
                <div class="me-status">● Online</div>
            </div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="chat-empty" id="emptyState">
            <div class="empty-icon">⚡</div>
            <div class="empty-title">Select someone to chat</div>
            <div class="empty-sub">Send a chat request first.<br>Messages vanish in 30 seconds.</div>
        </div>
        
        <div id="chatView" style="display:none;flex-direction:column;height:100%;">
            <div class="chat-header">
                <div class="chat-header-avatar" id="chatAvatar">👤</div>
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chatName">—</div>
                    <div class="chat-header-sub">
                        <span id="chatStatus">● Online</span>
                        <span class="flash-warning">⚡ 30s per message</span>
                    </div>
                </div>
            </div>
            
            <div class="messages" id="messagesArea"></div>
            
            <div class="input-bar">
                <input type="text" class="chat-input" id="messageInput" placeholder="Type a message... it'll vanish in 30s ⚡" onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
  </div>

  <!-- Request Modal -->
  <div class="modal" id="requestModal">
    <div class="modal-content">
        <div class="modal-title">📨 Chat Request</div>
        <p class="modal-text" id="requestText">Someone wants to chat!</p>
        <div class="modal-buttons">
            <button class="modal-btn decline" onclick="declineRequest()">Decline</button>
            <button class="modal-btn accept" onclick="acceptRequest()">Accept</button>
        </div>
    </div>
  </div>

  <script>
      let currentUser = null;
      let users = [];
      let currentChat = null;
      let pendingRequestUser = null;
      let messageInterval = null;
      let currentChatId = null;
      let messageElements = {};

      // Debug function
      function debug(msg) {
          console.log('[FlashChat]', msg);
      }

      fetch('/api/chat/user')
          .then(r => r.json())
          .then(data => {
              debug('Current user loaded: ' + data.username);
              currentUser = data;
              document.getElementById('currentUsername').textContent = data.username;
              document.getElementById('currentAvatar').textContent = data.username[0].toUpperCase();
              loadUsers();
              setInterval(loadUsers, 2000);
          })
          .catch(err => debug('Error loading user: ' + err));

      function loadUsers() {
          fetch('/api/chat/users')
              .then(r => r.json())
              .then(data => {
                  debug('Users loaded: ' + data.length);
                  users = data;
                  renderUsers();
                  
                  // Auto-join active chat if exists
                  const activeChat = users.find(u => u.chat_active);
                  if (activeChat && !currentChat) {
                      debug('Auto-joining active chat with: ' + activeChat.username);
                      startChat(activeChat);
                  }
              })
              .catch(err => debug('Error loading users: ' + err));
      }

      function renderUsers() {
          const list = document.getElementById('userList');
          const search = document.getElementById('searchInput').value.toLowerCase();
          
          list.innerHTML = '';
          
          if (users.length === 0) {
              list.innerHTML = '<div style="text-align: center; color: var(--text3); padding: 40px; font-size: 12px;">No other users. Open another browser!</div>';
              return;
          }
          
          users.forEach(user => {
              if (search && !user.username.toLowerCase().includes(search)) return;
              
              const div = document.createElement('div');
              div.className = 'contact-item';
              if (currentChat && currentChat.id === user.id) div.classList.add('active');
              
              const statusClass = user.online ? 'status-online' : 'status-offline';
              const ftcBadge = user.has_request ? '<div class="ftc-badge">💬</div>' : '';
              
              let actionBtn = '';
              let previewText = user.online ? 'Online' : 'Offline';
              
              // FIX: Use server-provided chat_id when active
              if (user.chat_active && user.chat_id) {
                  previewText = '🔵 Chat active - CLICK TO JOIN';
                  div.style.border = '1px solid var(--accent3)';
                  div.onclick = () => startChat(user, user.chat_id);  // Pass server chat_id
              } else if (user.has_request) {
                  previewText = 'Wants to chat! CLICK TO ACCEPT';
                  div.style.border = '1px solid var(--accent2)';
                  div.onclick = () => showRequestModal(user);
              } else if (user.request_sent) {
                  actionBtn = '<button class="request-btn sent">⏳</button>';
              } else {
                  actionBtn = `<button class="request-btn" data-user-id="${user.id}">📨</button>`;
              }
              
              div.innerHTML = `
                  <div class="c-avatar">
                      ${user.username[0].toUpperCase()}
                      <div class="status-dot ${statusClass}"></div>
                      ${ftcBadge}
                  </div>
                  <div class="c-info">
                      <div class="c-name">${user.username}</div>
                      <div class="c-preview" style="${user.chat_active || user.has_request ? 'color: var(--accent); font-weight: 600;' : ''}">${previewText}</div>
                  </div>
                  <div class="c-meta">
                      ${user.has_request ? '<div class="ftc-ping-badge">NEW</div>' : ''}
                      ${actionBtn}
                  </div>
              `;
              
              const btn = div.querySelector('.request-btn[data-user-id]');
              if (btn) {
                  btn.onclick = function(e) {
                      e.stopPropagation();
                      sendRequest(user.id, this);
                  };
              }
              
              list.appendChild(div);
          });
      }

      function sendRequest(userId, btn) {
          btn.textContent = '...';
          btn.disabled = true;
          
          fetch('/api/chat/request', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({user_id: userId})
          })
          .then(r => r.json())
          .then(data => {
              debug('Request sent to: ' + userId);
              btn.textContent = '✓';
              setTimeout(loadUsers, 500);
          })
          .catch(err => {
              debug('Error sending request: ' + err);
              btn.textContent = '✗';
          });
      }

      function filterUsers() {
          renderUsers();
      }

      function showRequestModal(user) {
          pendingRequestUser = user;
          document.getElementById('requestText').innerHTML =
              `<strong>${user.username}</strong> wants to chat!<br>Messages vanish after 30 seconds.`;
          document.getElementById('requestModal').style.display = 'flex';
      }

      function acceptRequest() {
          if (!pendingRequestUser) return;
          
          debug('Accepting request from: ' + pendingRequestUser.id);
          
          fetch('/api/chat/request/accept', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({user_id: pendingRequestUser.id})
          })
          .then(r => r.json())
          .then(data => {
              debug('Request accepted, chat_id: ' + data.chat_id);
              document.getElementById('requestModal').style.display = 'none';
              if (data.success) {
                  // Pass the server chat_id to startChat
                  startChat(pendingRequestUser, data.chat_id);
              }
              loadUsers();
          })
          .catch(err => debug('Error accepting request: ' + err));
      }

      function declineRequest() {
          if (!pendingRequestUser) return;
          
          fetch('/api/chat/request/decline', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({user_id: pendingRequestUser.id})
          })
          .then(() => {
              document.getElementById('requestModal').style.display = 'none';
              loadUsers();
          });
      }

      function startChat(user, serverChatId = null) {
          if (currentChat && currentChat.id === user.id) {
              debug('Already in chat with: ' + user.username);
              return;
          }
          
          debug('Starting chat with: ' + user.username);
          
          currentChat = user;
          
          // FIX: Always use server-provided chat_id if available
          if (serverChatId) {
              currentChatId = serverChatId;
              debug('Using server chat_id: ' + currentChatId);
          } else {
              // This shouldn't happen for active chats, but fallback just in case
              currentChatId = [currentUser.id, user.id].sort().join('_');
              debug('WARNING: Using generated chat_id: ' + currentChatId);
          }
          
          // Show chat interface
          document.getElementById('emptyState').style.display = 'none';
          const chatView = document.getElementById('chatView');
          chatView.style.display = 'flex';
          chatView.classList.remove('hidden');
          
          document.getElementById('chatName').textContent = user.username;
          document.getElementById('chatAvatar').textContent = user.username[0].toUpperCase();
          
          // Clear messages
          document.getElementById('messagesArea').innerHTML = '';
          messageElements = {};
          
          // Load messages
          loadMessages(currentChatId);
          
          // Start polling
          if (messageInterval) clearInterval(messageInterval);
          messageInterval = setInterval(() => {
              loadMessages(currentChatId);
          }, 800);
          
          setTimeout(() => document.getElementById('messageInput').focus(), 100);
      }

      function loadMessages(chatId) {
          debug('Loading messages for chat: ' + chatId);
          
          fetch(`/api/chat/messages/${chatId}`)
              .then(r => {
                  if (!r.ok) throw new Error('HTTP ' + r.status);
                  return r.json();
              })
              .then(messages => {
                  debug('Received ' + messages.length + ' messages from server');
                  
                  const area = document.getElementById('messagesArea');
                  
                  // Get IDs of messages currently in DOM
                  const currentIds = Object.keys(messageElements);
                  
                  // Get IDs of messages from server
                  const serverIds = messages.map(m => m.id);
                  
                  // FIX: Remove messages that are no longer on server (expired/deleted)
                  currentIds.forEach(id => {
                      if (!serverIds.includes(id)) {
                          debug('Message ' + id + ' expired, removing from DOM');
                          removeMessage(id);
                      }
                  });
                  
                  // Add or update messages from server
                  messages.forEach(msg => {
                      if (!messageElements[msg.id]) {
                          // Only add if less than 30 seconds old (double-check)
                          const age = (Date.now() - new Date(msg.created_at).getTime()) / 1000;
                          if (age < 30) {
                              debug('Adding new message: ' + msg.id);
                              addMessage(msg);
                          }
                      } else {
                          // Update countdown for existing message
                          updateMessageCountdown(msg);
                      }
                  });
              })
              .catch(err => debug('Error loading messages: ' + err));
      }

      function addMessage(msg) {
          const area = document.getElementById('messagesArea');
          const isOut = msg.sender === currentUser.id;
          
          const group = document.createElement('div');
          group.className = `msg-group ${isOut ? 'out' : 'in'}`;
          group.id = `msg-${msg.id}`;
          
          const secondsLeft = msg.seconds_left || 30;
          const time = new Date(msg.timestamp);
          const timeStr = time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
          
          let color = 'var(--accent)';
          if (secondsLeft < 10) color = 'var(--flash)';
          if (secondsLeft < 5) color = 'var(--danger)';
          
          group.innerHTML = `
              <div class="msg-sender-label">${isOut ? 'You' : msg.sender_name}</div>
              <div class="msg-bubble">
                  ${escapeHtml(msg.text)}
                  <div class="timer-bar-wrap">
                      <div class="timer-bar-fill" id="bar-${msg.id}" style="width: ${(secondsLeft/30)*100}%; background: ${color}"></div>
                  </div>
              </div>
              <div class="msg-meta">
                  <span class="msg-time">${timeStr}</span>
                  <span class="msg-countdown ${secondsLeft < 10 ? 'urgent' : ''}" id="count-${msg.id}" style="color: ${color}">
                      ${secondsLeft}s
                  </span>
              </div>
          `;
          
          area.appendChild(group);
          area.scrollTop = area.scrollHeight;
          
          // Store and schedule removal
          messageElements[msg.id] = {
              element: group,
              addedAt: Date.now()
          };
          
          // Schedule removal based on server-provided expiry
          const removeDelay = secondsLeft * 1000;
          setTimeout(() => {
              removeMessage(msg.id);
          }, removeDelay);
          
          // Start visual countdown
          startCountdown(msg.id, secondsLeft);
      }

      function startCountdown(msgId, seconds) {
          let left = seconds;
          const countdownEl = document.getElementById(`count-${msgId}`);
          const barEl = document.getElementById(`bar-${msgId}`);
          
          const interval = setInterval(() => {
              left--;
              
              if (countdownEl) {
                  countdownEl.textContent = left + 's';
                  let color = 'var(--accent)';
                  if (left < 10) {
                      color = 'var(--flash)';
                      countdownEl.classList.add('urgent');
                  }
                  if (left < 5) color = 'var(--danger)';
                  countdownEl.style.color = color;
              }
              
              if (barEl) {
                  barEl.style.width = (left/30)*100 + '%';
                  if (left < 5) barEl.style.background = 'var(--danger)';
              }
              
              if (left <= 0) clearInterval(interval);
          }, 1000);
      }

      function updateMessageCountdown(msg) {
          // Server tells us updated seconds_left
          const secondsLeft = msg.seconds_left || 30;
          const countdownEl = document.getElementById(`count-${msg.id}`);
          const barEl = document.getElementById(`bar-${msg.id}`);
          
          if (countdownEl) countdownEl.textContent = secondsLeft + 's';
          if (barEl) barEl.style.width = (secondsLeft/30)*100 + '%';
      }

      function removeMessage(msgId) {
          const msgData = messageElements[msgId];
          if (msgData && msgData.element) {
              // Add vanishing animation
              msgData.element.classList.add('msg-vanishing');
              
              // Remove from DOM after animation
              setTimeout(() => {
                  if (msgData.element && msgData.element.parentNode) {
                      msgData.element.parentNode.removeChild(msgData.element);
                  }
                  // FIX: Also remove from tracking object
                  delete messageElements[msgId];
                  debug('Message ' + msgId + ' fully removed');
              }, 500);
          } else {
              // If element doesn't exist, just clean up tracking
              delete messageElements[msgId];
          }
      }

      function sendMessage() {
          const input = document.getElementById('messageInput');
          const text = input.value.trim();
          if (!text || !currentChatId) {
              debug('Cannot send: no text or no chat');
              return;
          }
          
          debug('Sending message to chat: ' + currentChatId);
          input.value = '';
          
          fetch('/api/chat/send', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({chat_id: currentChatId, text: text})
          })
          .then(r => r.json())
          .then(data => {
              debug('Message sent, id: ' + data.id);
              // Immediately load messages to show our message
              loadMessages(currentChatId);
          })
          .catch(err => {
              debug('Error sending message: ' + err);
              input.value = text;
          });
      }

      function handleKeyPress(e) {
          if (e.key === 'Enter') sendMessage();
      }

      function escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
      }
      // Mobile detection and handling
      const isMobile = window.matchMedia("(max-width: 768px)").matches;

      if (isMobile) {
          debug('Mobile mode detected');
          
          // Auto-focus input when chat opens (mobile keyboards)
          const originalStartChat = startChat;
          startChat = function(user, serverChatId) {
              originalStartChat(user, serverChatId);
              // Delay focus to allow transition
              setTimeout(() => {
                  const input = document.getElementById('messageInput');
                  if (input) input.focus();
              }, 300);
          };
          
          // Handle viewport resize (mobile keyboard appearing)
          window.addEventListener('resize', () => {
              if (currentChatId) {
                  // Scroll to bottom when keyboard opens/closes
                  const area = document.getElementById('messagesArea');
                  if (area) area.scrollTop = area.scrollHeight;
              }
          });
      }

      // Prevent zoom on double-tap (iOS)
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (e) => {
          const now = Date.now();
          if (now - lastTouchEnd <= 300) {
              e.preventDefault();
          }
          lastTouchEnd = now;
      }, false);
  </script>

</body>
