<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Write — Chronicle</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-icon">◆</span>
        Chronicle
      </a>
      <div class="nav-links">
        <a href="/">Articles</a>
        <a href="/write" class="active">Write</a>
        <a href="#about">About</a>
      </div>
    </div>
  </nav>

  <main class="write-container">
    <div class="write-header">
      <h1>Compose Article</h1>
      <p class="hero-subtitle">Share your perspective with clarity and purpose.</p>
    </div>

    <form method="POST" action="/write" class="write-form">
      <div class="form-group">
        <label for="title">Headline</label>
        <input type="text" id="title" name="title" placeholder="Enter a compelling title..." required>
      </div>
      
      <div class="form-group">
        <label for="content">Content</label>
        <textarea id="content" name="content" placeholder="# Introduction

Start with a strong hook...

## Key Points

- Point one
- Point two

## Conclusion

Wrap up your thoughts..." required></textarea>
        <small class="form-hint">
          Markdown supported: # Heading, ## Subheading, **bold**, - list
        </small>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn-primary">Publish Article</button>
        <a href="/" class="btn-ghost">Cancel</a>
      </div>
    </form>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <h3>Chronicle</h3>
        <p>Independent writing on the ideas that matter.</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 Chronicle. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
