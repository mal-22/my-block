<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ post.title }} — Chronicle</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-icon">◆</span>
        Chronicle
      </a>
      <div class="nav-links">
        <a href="/">Articles</a>
        <a href="/write">Write</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <article class="post-full">
    <div class="post-meta">
      <span class="date">{{ post.date }}</span>
    </div>
    <h2>{{ post.title }}</h2>
    {{ post.content_html }}
  
    <div class="post-actions">
      <form action="/delete/{{ post.slug }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this post?');">
        <button type="submit" class="btn-delete">Delete Post</button>
      </form>
    </div>
  
    <div class="post-navigation">
      <a href="/" class="btn-ghost">← Back to all articles</a>
    </div>
  </article>
  </main>

  <footer class="footer">
    <div class="footer-bottom">
      <p>&copy; 2025 Chronicle. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
