<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - QuickChat</title>
  <style>
    body { font-family:sans-serif; background:#f4f4f4; display:flex; justify-content:center; align-items:center; height:100vh; }
    form { background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px; }
    input { width:100%; padding:8px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc; }
    button { width:100%; padding:8px; background:#4CAF50; color:white; border:none; border-radius:4px; cursor:pointer; }
    .error { color:red; margin-bottom:10px; }
    a { text-decoration:none; color:#4CAF50; display:block; margin-top:10px; text-align:center; }
  </style>
</head>
<body>
  <form method="POST">
    <h2>Create Account</h2>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Register</button>
    <a href="/login">Already have an account? Login</a>
  </form>
</body>
</html>
