<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashChat - Chronicle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .chat-container {
            max-width: 400px;
            margin: 80px auto;
            padding: 40px;
            background: #1a1a2e;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        
        .chat-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .chat-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #6366f1, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .chat-subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        
        .chat-input {
            width: 100%;
            padding: 14px 18px;
            background: #0f0f23;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            margin-bottom: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }
        
        .chat-input::placeholder {
            color: #64748b;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #6366f1;
            background: #0f0f23;
        }
        
        .chat-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            margin-bottom: 15px;
        }
        
        .chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        
        .chat-btn.secondary {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: #e2e8f0;
        }
        
        .chat-btn.secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: #6366f1;
        }
        
        .flash-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .toggle-mode {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        .toggle-mode a {
            color: #6366f1;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 600;
        }
        
        .toggle-mode a:hover {
            color: #818cf8;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #6366f1;
        }
    </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="logo">
        <span class="logo-icon">◆</span>
        Chronicle
      </a>
    </div>
  </nav>

  <div class="chat-container">
      <div class="chat-logo">⚡</div>
      <div class="chat-title">FlashChat</div>
      <div class="chat-subtitle" id="modeSubtitle">Create an account to start chatting</div>
      
      {% with messages = get_flashed_messages() %}
          {% if messages %}
              {% for message in messages %}
                  <div class="flash-message">{{ message }}</div>
              {% endfor %}
          {% endif %}
      {% endwith %}
      <form method="POST" action="/login">
          <input type="text" name="username" class="chat-input" placeholder="Username" required maxlength="20">
          <input type="password" name="password" class="chat-input" placeholder="Password" required>
          <button type="submit" class="chat-btn">Join Chat</button>
      </form>
      
      <div class="toggle-mode">
          <span id="toggleText">Already have an account?</span>
          <a onclick="toggleMode()" id="toggleLink">Login</a>
      </div>
      
      <a href="/" class="back-link">← Return to Chronicle</a>
  </div>

  <script>
    let isLoginMode = false;
    
    function toggleMode() {
        isLoginMode = !isLoginMode;
        const isLoginInput = document.getElementById('isLogin');
        const submitBtn = document.getElementById('submitBtn');
        const modeSubtitle = document.getElementById('modeSubtitle');
        const toggleText = document.getElementById('toggleText');
        const toggleLink = document.getElementById('toggleLink');
        
        if (isLoginMode) {
            isLoginInput.value = 'true';
            submitBtn.textContent = 'Login';
            modeSubtitle.textContent = 'Welcome back! Login to continue';
            toggleText.textContent = "Don't have an account?";
            toggleLink.textContent = 'Sign Up';
        } else {
            isLoginInput.value = 'false';
            submitBtn.textContent = 'Sign Up';
            modeSubtitle.textContent = 'Create an account to start chatting';
            toggleText.textContent = 'Already have an account?';
            toggleLink.textContent = 'Login';
        }
    }
  </script>

</body>
</html>
